<!DOCTYPE html>
<html>
<head>
  <title>Lucky Legendary Bracket Wheel</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3fff3;
      text-align: center;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    h1, p, #result {
      color: #1b5e20;
    }

    h1 { margin-top: 15px; font-size: 24px; }
    p { font-size: 14px; }

    .wheel-container {
      position: relative;
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      margin: 30px auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #1b5e20;
      background: conic-gradient(
        #b6f7b6 0% 10%,
        #7efc7e 10% 20%,
        #b6f7b6 20% 30%,
        #7efc7e 30% 40%,
        #b6f7b6 40% 50%,
        #7efc7e 50% 60%,
        #b6f7b6 60% 70%,
        #7efc7e 70% 80%,
        #b6f7b6 80% 90%,
        #7efc7e 90% 100%
      );
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
    }

    button {
      margin-top: 10px;
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 12px;
      width: 70%;
      max-width: 250px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }

    .rarity {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    .common { color: #2e7d32; }
    .rare { color: #1976d2; }
    .epic { color: #7b1fa2; }
    .mythic { color: #ff8f00; }

    .clover {
      position: absolute;
      font-size: 18px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-50px); opacity: 1; }
      100% { transform: translateY(600px); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🍀 Lucky Legendary Bracket Wheel 🍀</h1>
<p>One spin only</p>

<div class="wheel-container">
  <div class="pointer">⬇️</div>
  <div id="wheel" class="wheel"></div>
</div>

<button id="spinBtn" onclick="spinWheel()">SPIN 🍀</button>
<button onclick="shareResult()">Share Result</button>

<div id="result"></div>

<script>

/* ---------------- STATE ---------------- */
let spun = localStorage.getItem("spun") === "true";
let lastResult = "";
let currentAudio = null;

/* lock spin if already used */
if (spun) {
  document.getElementById("spinBtn").disabled = true;
}

/* ---------------- AUDIO FIX ---------------- */
const audioPool = [
  "Lucky_Legendary_Bracket.mp3",
  "Different_Blueprints.mp3",
  "Crown_of_the_Sovereign.mp3"
];

function playAudio() {
  // stop old audio cleanly
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  const track = audioPool[Math.floor(Math.random() * audioPool.length)];
  currentAudio = new Audio(track);
  currentAudio.volume = 0.7;

  // important: must be triggered by user click (spin button)
  currentAudio.play().catch(() => {
    console.log("Audio blocked until user interacts");
  });
}

/* ---------------- RARITY ---------------- */
function getRarity(v) {
  if (v <= 20) return { name:"Common", class:"common", bg:"#dff5e1" };
  if (v <= 50) return { name:"Rare", class:"rare", bg:"#dceeff" };
  if (v <= 75) return { name:"Epic", class:"epic", bg:"#f0e0ff" };
  return { name:"MYTHIC", class:"mythic", bg:"#fff4d6" };
}

/* ---------------- SPIN ---------------- */
function spinWheel() {
  if (spun) return;

  spun = true;
  localStorage.setItem("spun", "true");
  document.getElementById("spinBtn").disabled = true;

  const wheel = document.getElementById("wheel");

  playAudio();

  const rewards = [5,10,15,20,25,30,40,50,75,100];

  const weights = rewards.map(r => 1/r);
  const total = weights.reduce((a,b)=>a+b,0);

  let rand = Math.random() * total;
  let index = 0;

  for (let i = 0; i < rewards.length; i++) {
    rand -= weights[i];
    if (rand <= 0) {
      index = i;
      break;
    }
  }

  const reward = rewards[index];
  const rarity = getRarity(reward);

  const rotation = 360 * 5 + index * 36;
  wheel.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    document.body.style.background = rarity.bg;

    lastResult = `I won ${reward} Lucky Points (${rarity.name})`;

    document.getElementById("result").innerHTML =
      `🍀 You won <b>${reward}</b> Lucky Points
       <span class="rarity ${rarity.class}">${rarity.name}</span>`;

    spawnClovers();
  }, 4200);
}

/* ---------------- EFFECTS ---------------- */
function spawnClovers() {
  for (let i = 0; i < 25; i++) {
    const c = document.createElement("div");
    c.className = "clover";
    c.innerHTML = "🍀";
    c.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

/* ---------------- SHARE ---------------- */
function shareResult() {
  if (!lastResult) return alert("Spin first!");

  if (navigator.share) {
    navigator.share({
      title: "Lucky Wheel",
      text: lastResult
    });
  } else {
    navigator.clipboard.writeText(lastResult);
    alert("Copied!");
  }
}

</script>

</body>
</html>
