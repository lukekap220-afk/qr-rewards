<!DOCTYPE html>
<html>
<head>
  <title>Lucky Legendary Bracket Wheel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3fff3;
      text-align: center;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    h1, p, #result {
      color: #1b5e20;
    }

    .wheel-container {
      position: relative;
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      margin: 20px auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #1b5e20;
      background: conic-gradient(#b6f7b6 0% 10%, #7efc7e 10% 20%, #b6f7b6 20% 30%, #7efc7e 30% 40%, #b6f7b6 40% 50%, #7efc7e 50% 60%, #b6f7b6 60% 70%, #7efc7e 70% 80%, #b6f7b6 80% 90%, #7efc7e 90% 100%);
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      font-size: 16px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #leaderboard {
      margin-top: 20px;
      padding: 10px;
    }

    .entry {
      background: white;
      margin: 5px auto;
      padding: 8px;
      border-radius: 8px;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .rarity { font-weight: bold; }
    .common { color: #2e7d32; }
    .rare { color: #1976d2; }
    .epic { color: #7b1fa2; }
    .mythic { color: #ff8f00; }

    .clover {
      position: absolute;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(600px); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🍀 Lucky Legendary Bracket Wheel 🍀</h1>
<p>One spin only — make it count</p>

<div class="wheel-container">
  <div class="pointer">⬇️</div>
  <div id="wheel" class="wheel"></div>
</div>

<button id="spinBtn" onclick="spinWheel()">SPIN 🍀</button>
<button onclick="shareResult()">Share</button>

<div id="result"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<script>

// AUDIO
const audioPool = [
  "Lucky_Legendary_Bracket.mp3",
  "Different_Blueprints.mp3",
  "Crown_of_the_Sovereign.mp3"
];

let lastResult = "";

// LOCK
if (localStorage.getItem("spun")) {
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("result").innerHTML = "You already spun.";
}

// RARITY
function getRarity(value) {
  if (value <= 20) return {name:"Common", class:"common", bg:"#dff5e1"};
  if (value <= 50) return {name:"Rare", class:"rare", bg:"#dceeff"};
  if (value <= 75) return {name:"Epic", class:"epic", bg:"#f0e0ff"};
  return {name:"MYTHIC", class:"mythic", bg:"#fff4d6"};
}

// SPIN
function spinWheel() {
  if (localStorage.getItem("spun")) return;

  localStorage.setItem("spun","true");
  document.getElementById("spinBtn").disabled = true;

  new Audio(audioPool[Math.floor(Math.random()*audioPool.length)]).play();

  const rewards = [5,10,15,20,25,30,40,50,75,100];
  const weights = rewards.map(r => 1/r);
  let rand = Math.random() * weights.reduce((a,b)=>a+b);

  let index = 0;
  for (let i=0;i<rewards.length;i++){
    rand -= weights[i];
    if (rand <= 0){ index = i; break; }
  }

  const reward = rewards[index];
  const rarity = getRarity(reward);

  document.getElementById("wheel").style.transform =
    `rotate(${360*5 + index*36}deg)`;

  setTimeout(()=>{
    document.body.style.background = rarity.bg;

    lastResult = `I won ${reward} points (${rarity.name})`;

    document.getElementById("result").innerHTML =
      `You got <b>${reward}</b> <span class="${rarity.class}">${rarity.name}</span>`;

    saveScore(reward);
    renderLeaderboard();
    spawnClovers();
  },4200);
}

// LEADERBOARD
function saveScore(score) {
  let scores = JSON.parse(localStorage.getItem("leaderboard") || "[]");

  let name = prompt("Enter your name for leaderboard:");
  if (!name) name = "Anonymous";

  scores.push({name, score});
  scores.sort((a,b)=>b.score-a.score);
  scores = scores.slice(0,5);

  localStorage.setItem("leaderboard", JSON.stringify(scores));
}

function renderLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("leaderboard") || "[]");
  let html = "";

  scores.forEach((s,i)=>{
    html += `<div class="entry">#${i+1} ${s.name} - ${s.score}</div>`;
  });

  document.getElementById("leaderboard").innerHTML = html || "No scores yet";
}

// SHARE
function shareResult(){
  if(!lastResult) return alert("Spin first");

  if(navigator.share){
    navigator.share({text:lastResult});
  } else {
    navigator.clipboard.writeText(lastResult);
    alert("Copied!");
  }
}

// CLOVERS
function spawnClovers(){
  for(let i=0;i<25;i++){
    let c=document.createElement("div");
    c.className="clover";
    c.innerHTML="🍀";
    c.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

// INIT
renderLeaderboard();

</script>

</body>
</html>
