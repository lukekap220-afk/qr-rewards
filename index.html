<!DOCTYPE html>
<html>
<head>
  <title>Rewards Promo</title>
</head>

<body style="font-family: Arial; text-align:center; padding-top:50px;">

  <h1>🎉 Rewards System 🎉</h1>
  <p>Click to reveal your reward:</p>

  <button onclick="giveReward()" style="font-size:20px; padding:10px 20px;">
    Claim Reward
  </button>

  <h2 id="result"></h2>

  <script>
    function giveReward() {

      // 1% grand prize
      if (Math.random() < 0.01) {
        document.getElementById("result").innerHTML =
          "🏆 GRAND PRIZE! 🏆";
        return;
      }

      const rewards = [];
      for (let i = 5; i <= 100; i += 5) {
        rewards.push(i);
      }

      const weights = rewards.map(r => 1 / r);
      const total = weights.reduce((a, b) => a + b, 0);

      let rand = Math.random() * total;

      for (let i = 0; i < rewards.length; i++) {
        rand -= weights[i];
        if (rand <= 0) {
          document.getElementById("result").innerHTML =
            "You earned " + rewards[i] + " points!";
          return;
        }
      }
    }
  </script>

</body>
</html>
