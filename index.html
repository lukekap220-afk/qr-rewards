<!DOCTYPE html>
<html>
<head>
  <title>Lucky Legendary Bracket Wheel</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3fff3;
      text-align: center;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }

    h1 {
      color: green;
      margin-top: 15px;
      font-size: 24px;
    }

    p {
      color: green;
      font-size: 14px;
    }

    .wheel-container {
      position: relative;
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      margin: 30px auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid green;
      background: conic-gradient(
        #b6f7b6 0% 10%,
        #7efc7e 10% 20%,
        #b6f7b6 20% 30%,
        #7efc7e 30% 40%,
        #b6f7b6 40% 50%,
        #7efc7e 50% 60%,
        #b6f7b6 60% 70%,
        #7efc7e 70% 80%,
        #b6f7b6 80% 90%,
        #7efc7e 90% 100%
      );
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
    }

    button {
      margin-top: 10px;
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
      background: green;
      color: white;
      border: none;
      border-radius: 12px;
      width: 70%;
      max-width: 250px;
    }

    #result {
      color: green;
      margin-top: 15px;
      font-size: 18px;
      padding: 0 10px;
    }

    .rarity {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    .common { color: #2e7d32; }
    .rare { color: #1976d2; }
    .epic { color: #7b1fa2; }
    .mythic { color: #ff8f00; }

    .clover {
      position: absolute;
      font-size: 18px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🍀 Lucky Legendary Bracket Wheel 🍀</h1>
<p>Spin and test your luck</p>

<div class="wheel-container">
  <div class="pointer">⬇️</div>
  <div id="wheel" class="wheel"></div>
</div>

<button id="spinBtn" onclick="spinWheel()">SPIN 🍀</button>
<button onclick="resetSpin()">Reset (Test Mode)</button>
<button onclick="shareResult()">Share Result</button>

<div id="result"></div>

<script>

// TEST MODE: allow multi-spin
let TEST_MODE = true;

if (!TEST_MODE && localStorage.getItem("spun")) {
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("result").innerHTML = "You already spun the wheel.";
}

// sounds
let bgMusic = new Audio(Math.random() < 0.5 
  ? "Lucky_Legendary_Bracket.mp3" 
  : "Different_Blueprints.mp3"
);

bgMusic.loop = true;
bgMusic.volume = 0.4;

document.body.addEventListener("click", () => {
  if (bgMusic.paused) bgMusic.play();
}, { once: true });

let grandSound = new Audio("Crown_of_the_Sovereign.mp3");

let lastResult = "";

function getRarity(value) {
  if (value <= 20) return {name: "Common", class: "common", bg: "#e8f5e9"};
  if (value <= 50) return {name: "Rare", class: "rare", bg: "#e3f2fd"};
  if (value <= 75) return {name: "Epic", class: "epic", bg: "#f3e5f5"};
  return {name: "MYTHIC", class: "mythic", bg: "#fff3e0"};
}

function spinWheel() {
  if (!TEST_MODE && localStorage.getItem("spun")) return;

  if (!TEST_MODE) localStorage.setItem("spun", "true");

  const wheel = document.getElementById("wheel");

  const rewards = [5,10,15,20,25,30,40,50,75,100];

  const weights = rewards.map(r => 1 / r);
  const total = weights.reduce((a,b)=>a+b,0);

  let rand = Math.random() * total;
  let selectedIndex = 0;

  for (let i=0;i<rewards.length;i++){
    rand -= weights[i];
    if (rand <= 0){
      selectedIndex = i;
      break;
    }
  }

  const reward = rewards[selectedIndex];
  const rarity = getRarity(reward);

  const rotation = 360 * 5 + (selectedIndex * 36);
  wheel.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {

    // 1% jackpot
    if (Math.random() < 0.01) {
      document.body.style.background = "#ffe082";

      lastResult = "🏆 GRAND PRIZE UNLOCKED!";
      document.getElementById("result").innerHTML =
        `<span class="rarity mythic">${lastResult}</span>`;

      grandSound.currentTime = 0;
      grandSound.play();
      spawnClovers();
      return;
    }

    // Change background based on rarity
    document.body.style.background = rarity.bg;

    lastResult = `I just won ${reward} Lucky Points (${rarity.name}) 🍀`;

    document.getElementById("result").innerHTML =
      `🍀 You won <b>${reward}</b> Lucky Points<br>
       <span class="rarity ${rarity.class}">
       ${rarity.name} Reward
       </span>`;

    spawnClovers();

  }, 4200);
}

function spawnClovers() {
  for (let i = 0; i < 30; i++) {
    let c = document.createElement("div");
    c.className = "clover";
    c.innerHTML = "🍀";
    c.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

// RESET (for testing)
function resetSpin() {
  localStorage.removeItem("spun");
  document.getElementById("spinBtn").disabled = false;
  document.getElementById("result").innerHTML = "Spin reset.";
}

// SHARE FUNCTION
function shareResult() {
  if (!lastResult) {
    alert("Spin first!");
    return;
  }

  // Native share (mobile)
  if (navigator.share) {
    navigator.share({
      title: "Lucky Wheel",
      text: lastResult
    });
  } else {
    // fallback copy
    navigator.clipboard.writeText(lastResult);
    alert("Result copied to clipboard!");
  }
}

</script>

</body>
</html>
