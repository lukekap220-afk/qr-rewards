<!DOCTYPE html>
<html>
<head>
  <title>Lucky Legendary Wheel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3fff3;
      text-align: center;
      transition: background 0.5s ease;
    }

    h1, #result { color: #1b5e20; }

    .wheel-container {
      position: relative;
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      margin: 20px auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #1b5e20;
      background: conic-gradient(#b6f7b6 0% 10%, #7efc7e 10% 20%, #b6f7b6 20% 30%, #7efc7e 30% 40%, #b6f7b6 40% 50%, #7efc7e 50% 60%, #b6f7b6 60% 70%, #7efc7e 70% 80%, #b6f7b6 80% 90%, #7efc7e 90% 100%);
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      font-size: 16px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .entry {
      background: white;
      margin: 5px auto;
      padding: 8px;
      border-radius: 8px;
      width: 80%;
      max-width: 300px;
    }
  </style>
</head>

<body>

<h1>🍀 Lucky Wheel 🍀</h1>

<div class="wheel-container">
  <div class="pointer">⬇️</div>
  <div id="wheel" class="wheel"></div>
</div>

<button onclick="spinWheel()">SPIN</button>

<div id="result"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://ixaywrxlmoqqtdqdatqp.supabase.co";
const supabaseKey = "YOUR_SUPABASE_KEY_HERE"; // 🔴 paste your key here

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let lastScore = 0;

// RARITY BACKGROUNDS
function getRarity(value) {
  if (value <= 20) return {name:"Common", bg:"#dff5e1"};
  if (value <= 50) return {name:"Rare", bg:"#dceeff"};
  if (value <= 75) return {name:"Epic", bg:"#f0e0ff"};
  return {name:"Mythic", bg:"#fff4d6"};
}

// SPIN
async function spinWheel() {
  const rewards = [5,10,15,20,25,30,40,50,75,100];
  const reward = rewards[Math.floor(Math.random()*rewards.length)];
  const rarity = getRarity(reward);

  document.getElementById("wheel").style.transform =
    `rotate(${360*5 + Math.random()*360}deg)`;

  setTimeout(async () => {

    document.body.style.background = rarity.bg;
    lastScore = reward;

    let name = prompt("Enter your name:");
    if (!name) name = "Anonymous";

    document.getElementById("result").innerHTML =
      `You got <b>${reward}</b> points (${rarity.name})`;

    await supabase.from("leaderboard").insert([
      { name, score: reward }
    ]);

    loadLeaderboard();

  }, 4000);
}

// LOAD LEADERBOARD
async function loadLeaderboard() {
  const { data } = await supabase
    .from("leaderboard")
    .select("*")
    .order("score", { ascending: false })
    .limit(10);

  let html = "";

  data.forEach((d, i) => {
    html += `<div class="entry">#${i+1} ${d.name} - ${d.score}</div>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

loadLeaderboard();

</script>

</body>
</html>
