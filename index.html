<!DOCTYPE html>
<html>
<head>
  <title>Lucky Legendary Bracket Wheel</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3fff3;
      text-align: center;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    h1 {
      color: #00ff88;
      margin-top: 15px;
      font-size: 24px;
    }

    p {
      color: #00ff88;
      font-size: 14px;
    }

    .wheel-container {
      position: relative;
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      margin: 30px auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #00ff88;
      background: conic-gradient(
        #39ff14 0% 10%,
        #00ffcc 10% 20%,
        #39ff14 20% 30%,
        #00ffcc 30% 40%,
        #39ff14 40% 50%,
        #00ffcc 50% 60%,
        #39ff14 60% 70%,
        #00ffcc 70% 80%,
        #39ff14 80% 90%,
        #00ffcc 90% 100%
      );
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 25px #00ff88;
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
    }

    button {
      margin-top: 10px;
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
      background: #00ff88;
      color: black;
      border: none;
      border-radius: 12px;
      width: 70%;
      max-width: 250px;
      box-shadow: 0 0 10px #00ff88;
    }

    #result {
      color: #00ff88;
      margin-top: 15px;
      font-size: 18px;
      padding: 0 10px;
    }

    .rarity {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    .common { color: #39ff14; }
    .rare { color: #00e5ff; }
    .epic { color: #d500f9; }
    .mythic { color: #ffd600; }

    .clover {
      position: absolute;
      font-size: 18px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🍀 Lucky Legendary Bracket Wheel 🍀</h1>
<p>One spin only — make it count</p>

<div class="wheel-container">
  <div class="pointer">⬇️</div>
  <div id="wheel" class="wheel"></div>
</div>

<button id="spinBtn" onclick="spinWheel()">SPIN 🍀</button>
<button onclick="shareResult()">Share Result</button>

<div id="result"></div>

<script>

// ONE SPIN LOCK
if (localStorage.getItem("spun")) {
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("result").innerHTML = "You already spun the wheel.";
}

// AUDIO POOL (all 3 now randomized)
const audioPool = [
  "Lucky_Legendary_Bracket.mp3",
  "Different_Blueprints.mp3",
  "Crown_of_the_Sovereign.mp3"
];

let currentAudio;
let lastResult = "";

function getRarity(value) {
  if (value <= 20) return {name: "Common", class: "common", bg: "linear-gradient(135deg, #39ff14, #00ff88)"};
  if (value <= 50) return {name: "Rare", class: "rare", bg: "linear-gradient(135deg, #00e5ff, #2979ff)"};
  if (value <= 75) return {name: "Epic", class: "epic", bg: "linear-gradient(135deg, #d500f9, #6a00ff)"};
  return {name: "MYTHIC", class: "mythic", bg: "linear-gradient(135deg, #ffd600, #ff6f00)"};
}

function spinWheel() {
  if (localStorage.getItem("spun")) return;

  localStorage.setItem("spun", "true");
  document.getElementById("spinBtn").disabled = true;

  // RANDOM AUDIO PER SPIN
  const randomTrack = audioPool[Math.floor(Math.random() * audioPool.length)];
  currentAudio = new Audio(randomTrack);
  currentAudio.volume = 0.5;
  currentAudio.play();

  const wheel = document.getElementById("wheel");

  const rewards = [5,10,15,20,25,30,40,50,75,100];

  const weights = rewards.map(r => 1 / r);
  const total = weights.reduce((a,b)=>a+b,0);

  let rand = Math.random() * total;
  let selectedIndex = 0;

  for (let i=0;i<rewards.length;i++){
    rand -= weights[i];
    if (rand <= 0){
      selectedIndex = i;
      break;
    }
  }

  const reward = rewards[selectedIndex];
  const rarity = getRarity(reward);

  const rotation = 360 * 5 + (selectedIndex * 36);
  wheel.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {

    // BACKGROUND CHANGE (NEON)
    document.body.style.background = rarity.bg;

    lastResult = `I just won ${reward} Lucky Points (${rarity.name}) 🍀`;

    document.getElementById("result").innerHTML =
      `🍀 You won <b>${reward}</b> Lucky Points<br>
       <span class="rarity ${rarity.class}">
       ${rarity.name} Reward
       </span>`;

    spawnClovers();

  }, 4200);
}

function spawnClovers() {
  for (let i = 0; i < 30; i++) {
    let c = document.createElement("div");
    c.className = "clover";
    c.innerHTML = "🍀";
    c.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

// SHARE
function shareResult() {
  if (!lastResult) {
    alert("Spin first!");
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: "Lucky Wheel",
      text: lastResult
    });
  } else {
    navigator.clipboard.writeText(lastResult);
    alert("Result copied!");
  }
}

</script>

</body>
</html>
